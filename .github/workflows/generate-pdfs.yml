name: PDF自動生成

on:
  push:
    branches: [main]
    paths:
      # HTM / CSS が更新されたときだけ実行
      - 'reference/siryoh/**/*.htm'
      - 'reference/siryoh/shared.css'
      - 'reference/*.htm'
      - 'scripts/generate-pdfs.js'
  workflow_dispatch: # 手動実行ボタン

permissions:
  contents: write  # PDF を自動コミットするために必要

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # ── 1. チェックアウト ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js セットアップ ──────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── 3. 日本語フォントインストール ────────────────────────────────────
      - name: Install Japanese fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            fonts-noto-cjk \
            fonts-ipafont-gothic \
            fonts-ipafont-mincho \
            fonts-ipaexfont
          fc-cache -fv

      # ── 4. 依存パッケージインストール（Puppeteer 同梱 Chromium も含む）──
      - name: Install dependencies
        run: npm ci

      # ── 5. ローカルサーバー起動（reference/ をルートとして配信）─────────
      - name: Start local server
        run: npx serve reference -p 8080 --no-clipboard &

      - name: Wait for server ready
        run: |
          for i in $(seq 1 10); do
            curl -s http://localhost:8080/ > /dev/null && echo "Server ready" && break
            echo "Waiting... ($i)"
            sleep 1
          done

      # ── 6. PDF 生成 ────────────────────────────────────────────────────
      - name: Generate PDFs
        run: node scripts/generate-pdfs.js

      # ── 7. 生成した PDF をリポジトリにコミット & プッシュ ───────────────
      - name: Commit generated PDFs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add 'reference/siryoh/shingi/*.pdf' 'reference/siryoh/sankoh/*.pdf' 'reference/siryoh/想定問答集.pdf' 2>/dev/null || true
          git add reference/siryoh/
          git diff --staged --quiet \
            && echo "変更なし — コミットをスキップ" \
            || git commit -m "chore: PDFを自動生成 [skip ci]"
          git push
